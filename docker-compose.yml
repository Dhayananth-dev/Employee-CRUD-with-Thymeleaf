services:
    app:
       build: .
       image: employee
       container_name: crud
       ports:
        - "8080:2030"
       environment:
        SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/employee
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root 
       depends_on:
         - db  
       restart: always
    db:
      image: mysql:8
      container_name: empdata
      restart: always
      ports:
        - "3307:3306"
      environment:
        MYSQL_DATABASE: employee
        MYSQL_ROOT_PASSWORD: root
      volumes:
        - mysql_data:/var/lib/mysql  
volumes:
    mysql_data:               
