services:
    app:
       build: .
       image: employee
       container_name: crud
       ports:
         - "2030:2030"
       depends_on:
         - db  
       restart: always
    db:
      image: mysql:8
      container_name: empdata
      restart: always
      ports:
        - "3307:3306"
      volumes:
        - mysql_data:/var/lib/mysql  
volumes:
    mysql_data:               
